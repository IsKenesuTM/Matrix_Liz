<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para mi novia</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #03060e;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      color: white;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .glow-layer,
    .glow-layer-2,
    .glow-layer-3,
    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .glow-layer {
      background: radial-gradient(circle at center, rgba(255, 182, 193, 0.12), transparent 40%);
    }

    .glow-layer-2 {
      background: radial-gradient(circle at top, rgba(186, 85, 211, 0.10), transparent 38%);
    }

    .glow-layer-3 {
      background: radial-gradient(circle at bottom, rgba(120, 255, 180, 0.08), transparent 35%);
    }

    .overlay {
      background: rgba(0, 0, 0, 0.18);
    }

    .center-ui {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 5;
      text-align: center;
    }

    .press-btn {
      position: relative;
      border: 1px solid rgba(255, 215, 235, 0.35);
      background: rgba(0, 0, 0, 0.22);
      color: white;
      border-radius: 999px;
      padding: 16px 34px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 0 24px rgba(255, 182, 193, 0.10), 0 16px 50px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }

    .press-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 30px rgba(255, 182, 193, 0.18), 0 16px 50px rgba(0, 0, 0, 0.38);
    }

    .press-btn:active {
      transform: scale(0.97);
    }

    .press-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
    }

    .press-btn:hover::before {
      transform: translateX(120%);
    }

    .hidden {
      display: none !important;
    }

    .countdown {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: white;
      text-shadow: 0 0 30px rgba(255, 182, 193, 0.45), 0 0 70px rgba(186, 85, 211, 0.18);
      user-select: none;
    }

    .ascii-wrap {
      max-width: 95vw;
      overflow-x: auto;
      padding: 12px;
    }

    .ascii {
      margin: 0;
      white-space: pre;
      font-family: "Courier New", Courier, monospace;
      font-size: clamp(0.42rem, 1.25vw, 1.15rem);
      line-height: 1.08;
      color: rgb(255, 226, 236);
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25), 0 0 30px rgba(186, 85, 211, 0.15);
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="glow-layer"></div>
  <div class="glow-layer-2"></div>
  <div class="glow-layer-3"></div>
  <div class="overlay"></div>

  <div class="center-ui">
    <button id="pressBtn" class="press-btn">Presionar</button>
    <div id="countdown" class="countdown hidden">3</div>
    <div id="asciiWrap" class="ascii-wrap hidden">
      <pre id="asciiArt" class="ascii"></pre>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    const pressBtn = document.getElementById("pressBtn");
    const countdownEl = document.getElementById("countdown");
    const asciiWrap = document.getElementById("asciiWrap");
    const asciiArt = document.getElementById("asciiArt");

    const words = [
      "mi amor",
      "mi vida",
      "cariГ±o",
      "princesa",
      "reina",
      "tesoro",
      "bebГ©",
      "corazГіn",
      "bonita",
      "angelito",
      "hermosa",
      "linda",
      "mi cielo",
      "amorcito",
      "preciosa",
      "dulzura",
      "mi niГ±a",
      "chiquita",
      "mi sol",
      "estrellita"
    ];

    const palette = [
      [255, 105, 180],
      [186, 85, 211],
      [120, 255, 180],
      [255, 220, 120],
      [255, 110, 110],
      [255, 182, 193]
    ];

    const asciiLove = String.raw`в–€в–€в–€в–€в–€в–€в–€в–€в•—в–€в–€в–€в–€в–€в–€в–€в•—      в–€в–€в–€в–€в–€в•— в–€в–€в–€в•—   в–€в–€в–€в•— в–€в–€в–€в–€в–€в–€в•— 
в•љв•ђв•ђв–€в–€в•”в•ђв•ђв•ќв–€в–€в•”в•ђв•ђв•ђв•ђв•ќ     в–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в–€в–€в•— в–€в–€в–€в–€в•‘в–€в–€в•”в•ђв•ђв•ђв–€в–€в•—
   в–€в–€в•‘   в–€в–€в–€в–€в–€в•—       в–€в–€в–€в–€в–€в–€в–€в•‘в–€в–€в•”в–€в–€в–€в–€в•”в–€в–€в•‘в–€в–€в•‘   в–€в–€в•‘
   в–€в–€в•‘   в–€в–€в•”в•ђв•ђв•ќ       в–€в–€в•”в•ђв•ђв–€в–€в•‘в–€в–€в•‘в•љв–€в–€в•”в•ќв–€в–€в•‘в–€в–€в•‘   в–€в–€в•‘
   в–€в–€в•‘   в–€в–€в–€в–€в–€в–€в–€в•—     в–€в–€в•‘  в–€в–€в•‘в–€в–€в•‘ в•љв•ђв•ќ в–€в–€в•‘в•љв–€в–€в–€в–€в–€в–€в•”в•ќ
   в•љв•ђв•ќ   в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ќ     в•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќ     в•љв•ђв•ќ в•љв•ђв•ђв•ђв•ђв•ђв•ќ `;

    asciiArt.textContent = asciiLove;

    let width = 0;
    let height = 0;
    let columns = [];
    let animationId = null;

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function setupCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;

      const fontSize = Math.max(16, Math.min(24, width / 70));
      const gap = fontSize * 1.15;
      const columnSpacing = fontSize * 1.35;
      const columnCount = Math.ceil(width / columnSpacing) + 10;

      columns = Array.from({ length: columnCount }, (_, index) => ({
        x: index * columnSpacing + (Math.random() * fontSize - fontSize * 0.5),
        y: -Math.random() * height,
        speed: 1.2 + Math.random() * 2.8,
        fontSize,
        gap,
        word: pick(words),
        color: pick(palette),
        opacity: 0.35 + Math.random() * 0.45,
        switchRate: 0.008 + Math.random() * 0.016
      }));
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(3, 6, 14, 0.14)";
      ctx.fillRect(0, 0, width, height);

      for (const column of columns) {
        if (Math.random() < column.switchRate) {
          column.word = pick(words);
          column.color = pick(palette);
        }

        const letters = column.word.split("");
        ctx.font = `${column.fontSize}px monospace`;
        ctx.textAlign = "left";

        for (let i = 0; i < letters.length; i++) {
          const letter = letters[i];
          const charY = column.y + i * column.gap;
          if (charY < -50 || charY > height + 50) continue;

          const isHead = i === letters.length - 1;
          const alpha = Math.max(0.1, column.opacity - (letters.length - i - 1) * 0.05);
          const [r, g, b] = column.color;

          ctx.shadowBlur = isHead ? 14 : 8;
          ctx.shadowColor = isHead
            ? `rgba(${r}, ${g}, ${b}, 0.95)`
            : `rgba(${r}, ${g}, ${b}, 0.45)`;

          ctx.fillStyle = isHead
            ? "rgba(255, 250, 252, 0.98)"
            : `rgba(${r}, ${g}, ${b}, ${alpha})`;

          ctx.fillText(letter, column.x, charY);
        }

        ctx.shadowBlur = 0;
        column.y += column.speed;

        if (column.y > height + letters.length * column.gap + 40) {
          column.y = -80 - Math.random() * 320;
          column.word = pick(words);
          column.color = pick(palette);
        }
      }

      animationId = requestAnimationFrame(drawMatrix);
    }

    function resize() {
      if (animationId) cancelAnimationFrame(animationId);
      setupCanvas();
      ctx.fillStyle = "#03060e";
      ctx.fillRect(0, 0, width, height);
      drawMatrix();
    }

    function startCountdown() {
      pressBtn.classList.add("hidden");
      asciiWrap.classList.add("hidden");
      countdownEl.classList.remove("hidden");

      let count = 3;
      countdownEl.textContent = count;

      const interval = setInterval(() => {
        count -= 1;

        if (count <= 0) {
          clearInterval(interval);
          countdownEl.classList.add("hidden");
          asciiWrap.classList.remove("hidden");
          return;
        }

        countdownEl.textContent = count;
      }, 900);
    }

    pressBtn.addEventListener("click", startCountdown);
    window.addEventListener("resize", resize);

    setupCanvas();
    ctx.fillStyle = "#03060e";
    ctx.fillRect(0, 0, width, height);
    drawMatrix();
  </script>
</body>
</html>
